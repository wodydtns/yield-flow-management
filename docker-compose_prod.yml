version: '3.8'

services:
  # 1. Spring Boot App
  app:
    container_name: yield-flow-app
    build: .
    restart: always
    environment:
      # --- DB 설정 (내부망 postgres 컨테이너) ---
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/yieldflow_management
      - SPRING_DATASOURCE_USERNAME=yieldflow
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      
      # --- RabbitMQ 설정 (외부망 기존 컨테이너) ---
      - SPRING_RABBITMQ_HOST=rabbitmq 
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=wodydtns
      - SPRING_RABBITMQ_PASSWORD=flsdl@qkqn7
      
      # --- Redis 설정 (외부망) ---
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379

      - SERVER_FORWARD_HEADERS_STRATEGY=framework
       # [해결책] Swagger가 설정 파일을 찾을 때 사용할 전체 경로 지정
      - SPRINGDOC_SWAGGER_UI_CONFIG_URL=/yield-management/v3/api-docs/swagger-config
      
      # [선택] "Try it out" 실행 시 API 요청 경로 보정
      - SPRINGDOC_SWAGGER_UI_URL=/yield-management/swagger-ui.html
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - devops-network  # RabbitMQ, Redis와 통신
      - app-network     # PostgreSQL과 통신

  # 2. PostgreSQL Database (app-network 전용)
  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_DB: yieldflow_management
      POSTGRES_USER: yieldflow
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_prod_data:/var/lib/postgresql/data
      - ./src/main/resources/spring.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U yieldflow -d yieldflow_management" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app-network

volumes:
  pg_prod_data:

networks:
  devops-network:
    external: true
    name: devops-network
  app-network:
    driver: bridge
