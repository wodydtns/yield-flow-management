version: '3.8'

services:
  # 1. Spring Boot App
  app:
    container_name: yield-flow-app
    build: .
    restart: always
    environment:
      # DB 설정
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/yieldflow_management
      - SPRING_DATASOURCE_USERNAME=yieldflow
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      
      # [수정 1] RabbitMQ 설정 추가 (서비스명 'rabbitmq'를 호스트로 지정)
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
      
      # Redis 설정
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    networks:
      - devops-network
      - app-network

  # 2. PostgreSQL Database (app-network 전용)
  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_DB: yieldflow_management
      POSTGRES_USER: yieldflow
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_prod_data:/var/lib/postgresql/data
      - ./src/main/resources/spring.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U yieldflow -d yieldflow_management" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app-network

  # 3. Redis (devops-network 전용)
  redis:
    image: redis:alpine
    container_name: redis-cache
    networks:
      - devops-network

  # [수정 2] RabbitMQ 서비스 추가
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      # 관리자 UI 접속용 (필요 없다면 주석 처리)
      - "15672:15672"
      # 5672 포트는 내부 네트워크로만 통신하므로 노출 불필요
    networks:
      - app-network  # 앱과 통신해야 하므로 app-network에 배치

volumes:
  pg_prod_data:

networks:
  devops-network:
    external: true
    name: devops-network
  app-network:
    driver: bridge
