version: '3.8'

services:
  # 1. Spring Boot App
  app:
    container_name: yield-flow-app
    # [수정 1] 빌드 컨텍스트 추가 (현재 디렉토리의 Dockerfile 사용)
    build: .
    restart: always
    environment:
      # [수정 2] 서비스 명(postgres)을 호스트로 사용
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/yieldflow_management
      - SPRING_DATASOURCE_USERNAME=yieldflow
      # 보안: Jenkins에서 주입받을 변수
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - devops-network

  # 2. PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: always
    # [보안] 운영 서버라면 외부 포트 노출을 제거하는 것이 좋습니다.
    # ports:
    #   - "5432:5432"
    environment:
      POSTGRES_DB: yieldflow_management
      POSTGRES_USER: yieldflow
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      # [수정 3] Named Volume 사용 (데이터 안전성 강화)
      - pg_prod_data:/var/lib/postgresql/data
      # 초기화 SQL (소스 코드에 포함되어 있다고 가정)
      - ./src/main/resources/spring.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U yieldflow -d yieldflow_management" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - devops-network

volumes:
  pg_prod_data:


networks:
  devops-network:
    driver: bridge
