version: '3.8'

services:
  # 1. Spring Boot App
  app:
    container_name: yield-flow-app
    build: .
    restart: always
    environment:
      # --- DB 설정 (내부망 postgres 컨테이너) ---
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/yieldflow_management
      - SPRING_DATASOURCE_USERNAME=yieldflow
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      
      # --- RabbitMQ 설정 (외부망 기존 컨테이너) ---
      # 중요: 기존에 실행 중인 컨테이너 이름이 'rabbitmq'라고 가정합니다.
      # 만약 기존 컨테이너 이름이 다르다면 그 이름을 적어야 합니다.
      - SPRING_RABBITMQ_HOST=rabbitmq 
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=guest
      - SPRING_RABBITMQ_PASSWORD=guest
      
      # --- Redis 설정 (외부망) ---
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      # rabbitmq는 외부에서 이미 돌고 있으므로 여기서 기다리지 않습니다.
    networks:
      - devops-network  # RabbitMQ, Redis와 통신
      - app-network     # PostgreSQL과 통신

  # 2. PostgreSQL Database (app-network 전용)
  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_DB: yieldflow_management
      POSTGRES_USER: yieldflow
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_prod_data:/var/lib/postgresql/data
      - ./src/main/resources/spring.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U yieldflow -d yieldflow_management" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app-network

  # 3. Redis (devops-network 사용)
  # (만약 Redis도 "기존에 있는 걸 사용"하는 거라면 이 섹션도 지워야 합니다.
  #  하지만 "Redis는 devops-network를 사용하고"라고 하셔서 일단 남겨둡니다.)
  redis:
    image: redis:alpine
    container_name: redis-cache
    networks:
      - devops-network

volumes:
  pg_prod_data:

networks:
  devops-network:
    external: true
    name: devops-network
  app-network:
    driver: bridge
